<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do list</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">To-do List</div>
      <div class="addBox">
        <input type="text" class="todo" placeholder="Add a new task..." />
        <button class="add-btn">Add</button>
      </div>
      <div>
        <button class="filter-btn" class="chosen">All</button>
        <button class="filter-btn">Active</button>
        <button class="filter-btn">Completed</button>
      </div>
      <div class="list">
        <p class="no-task">No tasks yet. Add one above!</p>
      </div>
      <div class="footer">
        <p class="power">Powered by</p>
        <p class="pine">Pinecone academy</p>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
